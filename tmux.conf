set -g default-terminal "screen-255color"
set -ga terminal-overrides ",*:RGB"

set -g mouse on
set -g set-clipboard on

# --- Change Prefix to Ctrl + a ---
unbind C-b
set -g prefix C-a
bind-key C-a send-prefix

bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

unbind %
bind | split-window -h -c "#{pane_current_path}"

unbind '"'
bind - split-window -v -c "#{pane_current_path}"

unbind r
bind r source-file $HOME/.config/tmux/tmux.conf \; display "Config Reloaded!"

set -g base-index 2
setw -g pane-base-index 2
set-window-option -g pane-base-index 2
set-option -g renumber-windows on

bind -n M0 select-window -t 1
bind -n M-1 select-window -t 2
bind -n M-2 select-window -t 3
bind -n M-3 select-window -t 4
bind -n M-4 select-window -t 5
bind -n M-5 select-window -t 6
bind -n M-6 select-window -t 7
bind -n M-7 select-window -t 8
bind -n M-8 select-window -t 9

set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
unbind -T copy-mode-vi MouseDragEnd2Pane

# Gruvbox Dark (Medium)
thm_bg="#282829"
thm_fg="#EBDBB3"
thm_cyan="#9EC07C"
thm_black="#2D2021"
thm_gray="#4C3836"
thm_magenta="#D3870B"
thm_pink="#FB4935"
thm_red="#FB4935"
thm_green="#B9BB26"
thm_yellow="#FABD3F"
thm_blue="#84A598"
thm_orange="#FE8020"
thm_black5="#504945"

# Status bar
set -g status "on"
set -g status-bg "${thm_bg}"
set -g status-justify "left"
set -g status-left-length "101"
set -g status-right-length "101"

# Messages
set -g message-style "fg=${thm_cyan},bg=${thm_gray},align=centre"
set -g message-command-style "fg=${thm_cyan},bg=${thm_gray},align=centre"

# Panes
set -g pane-border-style "fg=${thm_gray}"
set -g pane-active-border-style "fg=${thm_blue}"

# Windows
set -g window-status-activity-style "fg=${thm_fg},bg=${thm_bg},none"
set -g window-status-separator ""
set -g window-status-style "fg=${thm_fg},bg=${thm_bg},none"

# Statusline - current window
set -g window-status-current-format "#[fg=${thm_blue},bg=${thm_bg}] #I: #[fg=${thm_magenta},bg=${thm_bg}](✓) #[fg=${thm_cyan},bg=${thm_bg}]#(echo '#{pane_current_path}' | rev | cut -d'/' -f-1 | rev) #[fg=${thm_magenta},bg=${thm_bg}]"

# Statusline - other windows
set -g window-status-format "#[fg=${thm_blue},bg=${thm_bg}] #I: #[fg=${thm_fg},bg=${thm_bg}]#W"

# Statusline - right side
set -g status-right "#[fg=${thm_blue},bg=${thm_bg},nobold,nounderscore,noitalics]#[fg=${thm_bg},bg=${thm_blue},nobold,nounderscore,noitalics] #[fg=${thm_fg},bg=${thm_gray}] #W #{?client_prefix,#[fg=${thm_magenta}],#[fg=${thm_cyan}]}#[bg=${thm_gray}]#{?client_prefix,#[bg=${thm_magenta}],#[bg=${thm_cyan}]}#[fg=${thm_bg}] #[fg=${thm_fg},bg=${thm_gray}] #S #[fg=${thm_blue},bg=${thm_gray}]#[fg=${thm_bg},bg=${thm_blue}] #[fg=${thm_fg},bg=${thm_gray}] %d %b %H:%M "

# Statusline - left side
set -g status-left ""

# Modes
set -g clock-mode-colour "${thm_blue}"
set -g mode-style "fg=${thm_blue} bg=${thm_black5} bold"
